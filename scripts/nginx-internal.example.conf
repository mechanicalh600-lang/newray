# Nginx — نمونه برای سرور داخلی کارخانه
# کپی به /etc/nginx/sites-available/newray و symlink به sites-enabled

server {
    listen 80;
    server_name newray.local 192.168.1.50;  # IP یا hostname داخلی

    root /var/www/newray/dist;
    index index.html;

    # SPA (HashRouter — مسیرها بعد از # هستند)
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /rest/v1/ {
        proxy_pass http://127.0.0.1:3000/rest/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /storage/v1/ {
        proxy_pass http://127.0.0.1:3000/storage/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        client_max_body_size 50M;
    }

    location /auth/v1/ {
        proxy_pass http://127.0.0.1:3000/auth/v1/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /health {
        proxy_pass http://127.0.0.1:3000/health;
    }
}
