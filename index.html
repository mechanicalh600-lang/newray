<!DOCTYPE html>
<html lang="fa" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>رای‌نو</title>
    <script>
      // Recover route redirected by public/404.html on GitHub Pages.
      (function() {
        var redirect = window.location.search.match(/[?&]\/(.*)$/);
        if (!redirect) return;

        var path = redirect[1].replace(/~and~/g, '&');
        var cleanUrl =
          window.location.pathname.replace(/\/$/, '') +
          '/' +
          path.split('&')[0] +
          (path.split('&')[1] ? '?' + path.split('&').slice(1).join('&') : '') +
          window.location.hash;

        window.history.replaceState(null, '', cleanUrl);
      })();
    </script>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#800020" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
  <body class="bg-gray-50 dark:bg-gray-900 text-gray-800 dark:text-gray-100 transition-colors duration-200">
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('SW registered');
            })
            .catch(registrationError => {
              console.log('SW registration failed');
            });
        });
      }
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
